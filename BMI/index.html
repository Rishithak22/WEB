<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator</title>

    <meta
      name="description"
      content="Calculate your Body Mass Index and see how you compare to healthy ranges."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />

    <!---CSS file--->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
          <div class="text-center mb-4 pt-3">
            <div class="hero-icon mb-2">
              <i class="fa-solid fa-weight-scale"></i>
            </div>
            <h1 class="fw-bold mb-1" style="font-size: 2.5rem">
              BMI Calculator
            </h1>
            <p class="text-muted medium">
              Check your Body Mass Index and see how you <br />
              compare to healthy ranges
            </p>
          </div>

          <!-- Form -->
          <div class="card-glass p-4 mb-3">
            <!-- Units -->
            <div class="mb-3">
              <div class="unit-toggle">
                <button
                  class="unit-toggle active"
                  id="btnMetric"
                  onclick="setUnit('metric')"
                >
                  Metric (kg/cm)
                </button>
                <button
                  class="unit-toggle"
                  id="btnImperial"
                  onclick="setUnit('imperial')"
                >
                  Imperial (lbs/ft)
                </button>
              </div>
            </div>

            <!-- Gender -->
            <label class="form-label fw-semibold small text-muted"
              >GENDER</label
            >
            <div class="d-flex gap-2 mb-3">
              <button
                class="gender-btn active"
                id="btnMale"
                onclick="setGender('male')"
              >
                <i class="fa-solid fa-mars me-1"></i> Male
              </button>
              <button
                class="gender-btn"
                id="btnFemale"
                onclick="setGender('female')"
              >
                <i class="fa-solid fa-venus me-1"></i> Female
              </button>
            </div>
            <!-- Age -->
            <label class="form-label fw-semibold small text-muted">AGE</label>
            <div class="d-flex align-items-center gap-3 mb-3">
              <input
                type="range"
                class="form-range mb-3"
                id="ageSlider"
                min="5"
                max="120"
                value="25"
                oninput="updateAge(this.value)"
              />
              <input
                type="number"
                class="form-control mb-3"
                id="age"
                value="25"
                min="5"
                max="120"
                oninput="document.getElementById('ageSlider').value"
              />
              <span id="ageDisplay">yrs</span>
            </div>
            <!-- Height -->
            <div id="heightMetric">
              <label class="form-label fw-semibold small text-muted"
                >HEIGHT (cm)</label
              >
              <div class="d-flex align-items-center gap-3 mb-3">
                <input
                  type="range"
                  class="form-range mb-3"
                  id="heightRange"
                  min="50"
                  max="250"
                  value="170"
                  oninput="updateHeight(this.value)"
                />
                <input
                  type="number"
                  class="form-control mb-3"
                  id="heightCm"
                  value="170"
                  min="50"
                  max="250"
                />
                <span id="heightDisplay">cm</span>
              </div>
            </div>
            <div id="heightImperial" style="display: none">
              <label class="form-label fw-semibold small text-muted"
                >HEIGHT</label
              >
              <div class="d-flex gap-2 mb-3">
                <div class="flex-fill">
                  <div class="input-group">
                    <input
                      type="number"
                      class="form-control"
                      id="heightFt"
                      value="5"
                      min="1"
                      max="8"
                    />
                    <span class="input-group-text">ft</span>
                  </div>
                </div>
                <div class="flex-fill">
                  <div class="input-group">
                    <input
                      type="number"
                      class="form-control"
                      id="heightIn"
                      value="7"
                      min="0"
                      max="11"
                    />
                    <span class="input-group-text">in</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- Weight -->
            <div id="weightMetric">
              <label class="form-label fw-semibold small text-muted"
                >WEIGHT (kg)</label
              >
              <div class="d-flex align-items-center gap-3 mb-3">
                <input
                  type="range"
                  class="form-range mb-3"
                  id="weightRange"
                  min="30"
                  max="150"
                  value="70"
                  oninput="updateWeight(this.value)"
                />
                <input
                  type="number"
                  class="form-control mb-3"
                  id="weightKg"
                  value="70"
                  min="30"
                  max="150"
                />
                <span id="weightDisplay">kg</span>
              </div>
            </div>

            <div id="weightImperial" style="display: none">
              <label class="form-label fw-semibold small text-muted"
                >WEIGHT (lbs)</label
              >
              <input
                type="number"
                class="form-control mb-3"
                id="weightLbs"
                value="154"
                min="20"
                max="660"
              />
            </div>

            <!-- Buttons -->
            <button class="btn btn-calculate mb-2" onclick="calculateBMI()">
              <i class="fa-solid fa-calculator me-1"></i> Calculate BMI
            </button>
            <button
              class="btn btn-reset"
              id="btnReset"
              style="display: none"
              onclick="resetForm()"
            >
              <i class="fa-solid fa-rotate-left me-1"></i> Reset
            </button>
          </div>

          <!-- Result -->
          <div id="resultSection" style="display: none"></div>
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
